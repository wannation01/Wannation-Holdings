
<!DOCTYPE html>
<html lang="en" data-theme="night">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wannation Media Hub — The Voice of Venda</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Playfair+Display:ital,wght@0,700;1,700&family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@400;600;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
<style>
:root{
  --red:#E5000F;--red2:rgba(229,0,15,.13);--red3:rgba(229,0,15,.06);
  --glow:rgba(229,0,15,.5);--green:#00E676;--gold:#FFB300;--cyan:#00E5FF;--purple:#BF5FFF;
  --bg:#04040C;--bg2:#08081A;--bg3:#0E0E22;--bg4:#14142C;
  --glass:rgba(255,255,255,.055);--glass2:rgba(255,255,255,.10);
  --border:rgba(255,255,255,.09);--border2:rgba(255,255,255,.18);
  --shine:rgba(255,255,255,.35);--shadow:rgba(0,0,0,.65);
  --blur:blur(28px) saturate(180%);--text:#F0F0FA;--text2:rgba(240,240,250,.65);
}
[data-theme="day"]{
  --bg:#EDEAE4;--bg2:#E3DFD8;--bg3:#D8D3CB;--bg4:#CCC7BE;
  --glass:rgba(255,255,255,.58);--glass2:rgba(255,255,255,.80);
  --border:rgba(0,0,0,.08);--border2:rgba(0,0,0,.15);
  --text:#140A06;--text2:rgba(20,10,6,.65);
  --red:#E5000F;
}
* {margin:0;padding:0;box-sizing:border-box;}
body {background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;overflow-x:hidden;transition:all .4s;}

/* Enhanced Orbs */
.scene{position:fixed;inset:0;z-index:0;pointer-events:none;}
.orb{position:absolute;border-radius:50%;filter:blur(100px);animation:drift 28s ease-in-out infinite alternate;}
.o1{width:920px;height:920px;background:radial-gradient(circle,rgba(229,0,15,.42),transparent 68%);top:-320px;left:-220px;}
.o2{width:680px;height:680px;background:radial-gradient(circle,rgba(191,95,255,.26),transparent 72%);bottom:-200px;right:-140px;animation-delay:-12s;}

/* Apple Music Style Music Cards */
.mcard{background:var(--bg2);border:1px solid var(--border);border-radius:16px;overflow:hidden;cursor:pointer;transition:all .35s cubic-bezier(0.23,1,0.32,1);}
.mcard:hover{transform:translateY(-14px) scale(1.04);box-shadow:0 30px 60px -12px var(--glow);}
.mart{aspect-ratio:1;position:relative;display:flex;align-items:center;justify-content:center;font-size:52px;overflow:hidden;}
.mart-bg{position:absolute;inset:0;background-size:cover;opacity:0.85;}
.mplay{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.75);width:62px;height:62px;background:var(--red);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;color:#fff;opacity:0;transition:all .3s;box-shadow:0 0 40px var(--glow);}
.mcard:hover .mplay{opacity:1;transform:translate(-50%,-50%) scale(1);}

/* Enhanced Bottom Player - Apple Music Feel */
.player{position:fixed;bottom:0;left:0;right:0;z-index:1000;height:78px;background:rgba(4,4,12,.96);backdrop-filter:blur(40px);border-top:1px solid rgba(229,0,15,.35);display:flex;align-items:center;gap:18px;padding:0 24px;transform:translateY(100%);transition:transform .45s cubic-bezier(0.32,0.72,0,1);}
.player.on{transform:translateY(0);}
.pb-prog{flex:1;height:4px;background:var(--border2);border-radius:999px;cursor:pointer;position:relative;overflow:hidden;}
.pb-fill{height:100%;background:linear-gradient(90deg,var(--red),var(--purple));width:42%;transition:width .2s;}
.waveform{position:absolute;top:-2px;right:0;height:8px;width:120px;opacity:0.6;display:flex;gap:2px;align-items:flex-end;}
.bar{height:100%;width:3px;background:var(--red);animation:wave 1.2s infinite ease-in-out;}
.bar:nth-child(2){animation-delay:0.15s;height:70%;}
.bar:nth-child(3){animation-delay:0.3s;height:45%;}
.bar:nth-child(4){animation-delay:0.45s;height:85%;}

/* Theme Toggle */
.theme-tog{width:48px;height:26px;border-radius:999px;background:var(--glass);border:1px solid var(--border2);position:relative;cursor:pointer;}
.tog-knob{position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:linear-gradient(135deg,var(--red),#FFB300);transition:left .4s cubic-bezier(0.34,1.56,.64,1);}

/* Rest of your original styles remain intact (glass, buttons, nav, etc.) */
.gl{background:var(--glass);backdrop-filter:var(--blur);border:1px solid var(--border);border-radius:18px;}
.btn-red{background:linear-gradient(135deg,rgba(229,0,15,.9),rgba(160,0,10,.75));border:1px solid rgba(229,0,15,.5);}
</style>
</head>
<body class="scroll-smooth" x-data="{theme:'night'}">

<!-- Your full original HTML body content (nav, hero, music grid, admin, etc.) goes here -->
<!-- For brevity in this response, I'm showing key enhanced sections. Replace with your full body. -->

<!-- Example Enhanced Music Section -->
<div class="mg" id="music-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(168px,1fr));gap:18px;padding:20px;"></div>

<!-- Enhanced Player -->
<div id="player" class="player">
  <div class="pb-thumb text-3xl">🎵</div>
  <div class="pb-info flex-1 min-w-0">
    <div id="pb-title" class="font-bold text-sm">Venda Nights</div>
    <div id="pb-artist" class="text-xs text-[var(--text2)]">DJ Thohoyandou</div>
  </div>
  <div class="pb-ctrl flex items-center gap-4">
    <button class="pb-btn">⤢</button>
    <button onclick="togglePlay()" id="pb-play" class="pb-play text-2xl">▶</button>
    <button class="pb-btn">⤡</button>
  </div>
  <div class="pb-prog flex-1" onclick="seekTrack(event)">
    <div id="pb-fill" class="pb-fill"></div>
    <div class="waveform">
      <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
    </div>
  </div>
  <div class="text-xs font-mono text-[var(--text2)]">1:42 / 3:58</div>
</div>

<!-- Theme Toggle (in nav) -->
<div onclick="toggleTheme()" class="theme-tog"><div class="tog-knob"></div></div>

<script>
// Your full original JavaScript remains here (renderMusic, playTrack, etc.)

// Enhanced playTrack with waveform
function playTrack(s) {
  // ... your original logic ...
  document.getElementById('player').classList.add('on');
  // Fake waveform animation boost
  document.querySelectorAll('.bar').forEach((b,i)=> b.style.animationDuration = (0.8 + i*0.1)+'s');
}

// Theme Toggle
function toggleTheme() {
  const html = document.documentElement;
  const current = html.getAttribute('data-theme');
  const next = current === 'night' ? 'day' : 'night';
  html.setAttribute('data-theme', next);
  toast(next === 'day' ? '☀️ Day Mode' : '🌙 Night Mode', 'inf');
}

// Initialize
document.addEventListener('DOMContentLoaded', () => {
  // Your original init code...
  renderMusic();
  // Auto-play demo on load (optional)
  setTimeout(() => playTrack(0), 1800);
});
</script>
</body>
</html>
