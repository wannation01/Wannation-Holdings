<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wannation Media — The Voice of Venda</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --red:#E5000F;
  --glow:rgba(229,0,15,.7);
  --accent:#BF5FFF;
  --bg:#0A0A0F;
  --card:#12121F;
  --glass:rgba(255,255,255,.09);
  --text:#F8F8FA;
  --text2:rgba(248,248,250,.8);
}
@media (prefers-color-scheme: light) {
  :root {
    --bg:#F0EDE6;
    --card:#E8E3DB;
    --glass:rgba(255,255,255,.85);
    --text:#120A04;
    --text2:rgba(18,10,4,.75);
  }
}
* {margin:0;padding:0;box-sizing:border-box;}
body {background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;line-height:1.5;overflow-x:hidden;transition:background .6s ease;}
.glass {background:var(--glass);backdrop-filter:blur(36px) saturate(175%) contrast(115%);border:1px solid rgba(229,0,15,.25);border-radius:20px;}
.mcard {background:var(--card);border-radius:16px;overflow:hidden;cursor:pointer;transition:all .4s cubic-bezier(0.23,1,0.32,1);}
.mcard:hover {transform:translateY(-12px);box-shadow:0 30px 70px -15px var(--glow);}
.mart {height:200px;background:linear-gradient(135deg,#2d0008,#1a0015);display:flex;align-items:center;justify-content:center;font-size:82px;position:relative;}
.mplay {position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.75);width:78px;height:78px;background:var(--red);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:32px;color:white;opacity:0;transition:all .35s;box-shadow:0 0 55px var(--glow);}
.mcard:hover .mplay {opacity:1;transform:translate(-50%,-50%) scale(1);}
.player {position:fixed;bottom:0;left:0;right:0;z-index:1000;height:88px;background:rgba(10,10,15,.97);backdrop-filter:blur(55px) saturate(180%);border-top:1px solid rgba(229,0,15,.45);display:flex;align-items:center;gap:24px;padding:0 28px;transform:translateY(100%);transition:transform .45s cubic-bezier(0.32,0.72,0,1);}
.player.on {transform:translateY(0);}
</style>
</head>
<body>

<nav style="position:sticky;top:0;z-index:50;background:rgba(10,10,15,.96);backdrop-filter:blur(32px) saturate(170%);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid var(--red);">
  <div style="display:flex;align-items:center;gap:16px;">
    <span style="font-size:42px;filter:drop-shadow(0 0 15px var(--red));">🔴</span>
    <div>
      <div style="font-size:29px;font-weight:900;letter-spacing:3px;color:var(--red);">WANNATION MEDIA</div>
      <div style="font-size:13px;color:var(--text2);">The Voice of Venda</div>
    </div>
  </div>
</nav>

<div style="padding:100px 28px 80px;text-align:center;background:linear-gradient(to bottom,#1a0015,#0A0A0F);">
  <h1 style="font-size:56px;font-weight:900;letter-spacing:1px;margin-bottom:16px;">Ndi Matsheloni, Vhavenda</h1>
  <p style="font-size:24px;color:var(--text2);max-width:760px;margin:0 auto;">Music. News. Culture. Present.</p>
</div>

<div style="max-width:1380px;margin:0 auto;padding:40px 28px;">
  <h2 style="font-size:32px;margin-bottom:24px;color:var(--red);">Today's Venda • Live</h2>
  <div id="news-feed" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:24px;"></div>
</div>

<div style="max-width:1380px;margin:0 auto;padding:0 28px 80px;">
  <h2 style="font-size:32px;margin-bottom:24px;">WAN Music • Real Venda Artists</h2>
  <div id="music-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:24px;"></div>
</div>

<div id="player" class="player">
  <div style="font-size:42px;width:60px;">🎵</div>
  <div style="flex:1;min-width:0;">
    <div id="pb-title" style="font-weight:700;">Ndi Matsheloni</div>
    <div id="pb-artist" style="color:var(--text2);">Una Rams</div>
  </div>
  <button onclick="togglePlay()" style="width:64px;height:64px;border-radius:50%;background:var(--red);color:white;border:none;font-size:28px;cursor:pointer;box-shadow:0 0 35px var(--glow);">▶</button>
</div>

<script>
// Real Venda Artists
const SONGS = [
  {title:'Ndi Matsheloni',artist:'Una Rams'},
  {title:'Makhadzi',artist:'Makhadzi'},
  {title:'Venda Nga December',artist:'Mizo Phyll'},
  {title:'Yoo Shoma',artist:'Makhadzi'},
  {title:'Ramzeey Hits',artist:'Ramzeey'}
];

const NEWS = [
  {title:"Dzata Ruins Restoration Advances", desc:"Community efforts to preserve our ancestral heritage continue strongly.", time:"Today", cat:"Heritage"},
  {title:"Makhadzi Dominates Charts", desc:"The Queen of Venda music continues to lead.", time:"2h ago", cat:"Music"},
  {title:"Domba Season Preparations Begin", desc:"Young women preparing for the sacred Python Dance.", time:"Yesterday", cat:"Culture"}
];

function renderNews() {
  document.getElementById('news-feed').innerHTML = NEWS.map(n => `
    <div class="glass" style="padding:28px;cursor:pointer;" onclick="alert('${n.title}\\n\\n${n.desc}')">
      <div style="color:var(--red);font-size:13px;font-weight:700;">${n.cat} • ${n.time}</div>
      <div style="font-size:21px;font-weight:700;margin:14px 0 10px;">${n.title}</div>
      <div style="color:var(--text2);">${n.desc}</div>
    </div>
  `).join('');
}

function renderMusic() {
  document.getElementById('music-grid').innerHTML = SONGS.map((s,i) => `
    <div class="mcard" onclick="playTrack(${i})">
      <div class="mart">🎵</div>
      <div style="padding:20px;">
        <div style="font-weight:700;">${s.title}</div>
        <div style="color:var(--text2);">${s.artist}</div>
      </div>
    </div>
  `).join('');
}

let isPlaying = false;
function playTrack(i) {
  const s = SONGS[i];
  document.getElementById('player').classList.add('on');
  document.getElementById('pb-title').textContent = s.title;
  document.getElementById('pb-artist').textContent = s.artist;
}

function togglePlay() { alert("▶ Music playing (demo)"); }

// Auto Day/Night Mode
function setAutoTheme() {
  const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  document.documentElement.setAttribute('data-theme', isDark ? 'night' : 'day');
}
setAutoTheme();
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', setAutoTheme);

document.addEventListener('DOMContentLoaded', () => {
  renderNews();
  renderMusic();
});
</script>
</body>
</html>
