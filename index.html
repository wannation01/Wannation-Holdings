<!DOCTYPE html>
<html lang="en" data-theme="night">
<head>
<meta charset="UTF-8">
<title>Wannation Media — The Voice of Venda</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Playfair+Display:ital,wght@0,700;1,700&family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --red:#E5000F; --glow:rgba(229,0,15,.75); --accent:#BF5FFF;
  --bg:#0A0A0F; --card:#12121F; --glass:rgba(255,255,255,.08);
  --text:#F8F8FA; --text2:rgba(248,248,250,.78);
}
* {margin:0;padding:0;box-sizing:border-box;}
body {background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;overflow-x:hidden;}
.gl {background:var(--glass);backdrop-filter:blur(40px);border:1px solid rgba(229,0,15,.2);border-radius:20px;}

/* Artistic Apple Music Style */
.mcard {
  background:var(--card); border-radius:16px; overflow:hidden; cursor:pointer;
  transition:all .4s cubic-bezier(0.23,1,0.32,1); box-shadow:0 4px 20px rgba(0,0,0,.6);
}
.mcard:hover {transform:translateY(-14px) scale(1.04); box-shadow:0 35px 80px -15px var(--glow);}
.mart {aspect-ratio:1; position:relative; background:linear-gradient(135deg,#1a000f,#2d0008); display:flex;align-items:center;justify-content:center;font-size:82px;}
.mplay {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%) scale(0.75);
  width:78px; height:78px; background:var(--red); border-radius:50%;
  display:flex; align-items:center; justify-content:center; font-size:32px; color:white;
  opacity:0; transition:all .35s; box-shadow:0 0 55px var(--glow);
}
.mcard:hover .mplay {opacity:1; transform:translate(-50%,-50%) scale(1);}

.player {
  position:fixed; bottom:0; left:0; right:0; z-index:1000; height:88px;
  background:rgba(10,10,15,.98); backdrop-filter:blur(60px);
  border-top:1px solid rgba(229,0,15,.45); display:flex; align-items:center; gap:24px;
  padding:0 32px; transform:translateY(100%); transition:transform .45s cubic-bezier(0.32,0.72,0,1);
}
.player.on {transform:translateY(0);}
</style>
</head>
<body>

<!-- Artistic Header -->
<nav style="position:sticky;top:0;z-index:50;background:rgba(10,10,15,.96);backdrop-filter:blur(30px);padding:16px 32px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid var(--red);">
  <div style="display:flex;align-items:center;gap:16px;">
    <span style="font-size:42px;filter:drop-shadow(0 0 12px var(--red));">🪘</span>
    <div>
      <div style="font-size:29px;font-weight:900;letter-spacing:3px;color:var(--red);">WANNATION MEDIA</div>
      <div style="font-size:13px;color:var(--text2);">The Voice of Venda • Present & Powerful</div>
    </div>
  </div>
  <div onclick="toggleTheme()" style="cursor:pointer;font-size:26px;padding:8px 18px;border-radius:999px;border:1px solid rgba(255,255,255,.2);">☀️</div>
</nav>

<!-- Hero with Artistic Feel -->
<div style="padding:100px 32px 80px;text-align:center;background:linear-gradient(to bottom,#1a000f,#0A0A0F);position:relative;overflow:hidden;">
  <h1 style="font-size:58px;font-weight:900;letter-spacing:2px;margin-bottom:16px;color:var(--red);">WANNATION MEDIA</h1>
  <p style="font-size:24px;color:var(--text2);max-width:760px;margin:0 auto;">Bold sounds. Living culture. Venda present.</p>
</div>

<!-- Today's Fresh -->
<div style="max-width:1380px;margin:0 auto;padding:0 32px 60px;">
  <h2 style="font-size:32px;margin-bottom:24px;color:var(--red);">Today's Venda • Fresh Drops</h2>
  <div id="news-feed" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(380px,1fr));gap:28px;"></div>
</div>

<!-- Music Library -->
<div style="max-width:1380px;margin:0 auto;padding:0 32px 100px;">
  <h2 style="font-size:32px;margin-bottom:24px;">Hot from Our Artists</h2>
  <div id="music-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:28px;"></div>
</div>

<!-- Player -->
<div id="player" class="player">
  <div style="font-size:42px;width:60px;">🪘</div>
  <div style="flex:1;min-width:0;">
    <div id="pb-title" style="font-weight:700;font-size:15.5px;">Ndi Matsheloni</div>
    <div id="pb-artist" style="color:var(--text2);font-size:13.5px;">Una Rams</div>
  </div>
  <button onclick="togglePlay()" style="width:64px;height:64px;border-radius:50%;background:var(--red);color:white;border:none;font-size:28px;cursor:pointer;box-shadow:0 0 40px var(--glow);">▶</button>
  <div style="flex:1;height:5px;background:rgba(255,255,255,.2);border-radius:999px;position:relative;cursor:pointer;" onclick="seek(event)">
    <div id="pb-fill" style="height:100%;width:58%;background:linear-gradient(90deg,var(--red),var(--accent));"></div>
  </div>
</div>

<script>
// Real Content
const NEWS = [
  {title:"Dzata Ruins Restoration Advances", desc:"Youth and elders uniting to preserve our ancestral heritage.", time:"This morning", cat:"Heritage"},
  {title:"Una Rams Drops New Single", desc:"'Ndi Matsheloni' celebrates Venda identity and pride.", time:"2h ago", cat:"Music"}
];

const SONGS = [
  {title:'Ndi Matsheloni',artist:'Una Rams'},
  {title:'Venda Nights',artist:'DJ Thohoyandou'},
  {title:'Dzata Calling',artist:'VP Talking Muimbi'}
];

function renderNews(){
  document.getElementById('news-feed').innerHTML = NEWS.map(n => `
    <div class="gl" style="padding:28px;cursor:pointer;" onclick="alert('${n.title}\\n\\n${n.desc}')">
      <div style="color:var(--red);font-size:13px;font-weight:700;">${n.cat} • ${n.time}</div>
      <div style="font-size:21px;font-weight:700;margin:14px 0 10px;">${n.title}</div>
      <div style="color:var(--text2);">${n.desc}</div>
    </div>
  `).join('');
}

function renderMusic(){
  document.getElementById('music-grid').innerHTML = SONGS.map((s,i) => `
    <div class="mcard" onclick="playTrack(${i})">
      <div class="mart">🪘</div>
      <div style="padding:20px;">
        <div style="font-weight:700;font-size:16px;">${s.title}</div>
        <div style="color:var(--text2);margin-top:6px;">${s.artist}</div>
      </div>
    </div>
  `).join('');
}

let isPlaying = false;
function playTrack(i){
  const s = SONGS[i];
  document.getElementById('player').classList.add('on');
  document.getElementById('pb-title').textContent = s.title;
  document.getElementById('pb-artist').textContent = s.artist;
}

function togglePlay(){ alert("▶ Playing — full audio coming soon"); }
function toggleTheme(){
  const html = document.documentElement;
  const next = html.getAttribute('data-theme') === 'night' ? 'day' : 'night';
  html.setAttribute('data-theme', next);
  alert(next === 'day' ? '☀️ Light Mode' : '🌙 Night Mode');
}
function seek(){ alert("Progress updated"); }

// Init
document.addEventListener('DOMContentLoaded', () => {
  renderNews();
  renderMusic();
});
</script>
</body>
</html>
