<!DOCTYPE html>
<html lang="en" data-theme="night">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Venda Music Charts Top 20 — WANnation Media</title>
<link rel="icon" href="Untitled design.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#E5000F;--primary-glow:rgba(229,0,15,0.6);--gold:#FFD700;--bg:#000000;--bg-card:rgba(28,28,30,0.7);--glass:rgba(255,255,255,0.08);--glass-border:rgba(255,255,255,0.15);--text:#FFFFFF;--text-secondary:rgba(255,255,255,0.65)}
[data-theme="day"]{--bg:#F5F5F7;--bg-card:rgba(255,255,255,0.8);--glass:rgba(0,0,0,0.05);--glass-border:rgba(0,0,0,0.1);--text:#1D1D1F;--text-secondary:rgba(29,29,31,0.65)}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif}
.animated-bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-2}
.flag-stripe{position:absolute;width:100%;opacity:0.15;animation:pulse 8s infinite}
.stripe-1{height:33%;top:0;background:linear-gradient(180deg,var(--primary),transparent)}
.stripe-2{height:34%;top:33%;background:linear-gradient(180deg,#009B3A,transparent)}
.stripe-3{height:33%;bottom:0;background:linear-gradient(180deg,#00A3E0,transparent)}
@keyframes pulse{0%,100%{opacity:0.1}50%{opacity:0.2}}
header{position:sticky;top:0;z-index:1000;padding:16px 20px;background:rgba(0,0,0,0.9);backdrop-filter:blur(80px);border-bottom:1px solid var(--glass-border)}
.header-content{max-width:1400px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:16px;cursor:pointer}
.logo-img{width:48px;height:48px;border-radius:50%;border:2px solid var(--primary)}
.logo-title{font-size:22px;font-weight:900}
.nav-links{display:flex;gap:8px}
.nav-links a{color:var(--text-secondary);text-decoration:none;font-weight:600;font-size:14px;padding:10px 16px;border-radius:12px}
.nav-links a.active{color:var(--text);background:var(--primary)}
main{max-width:1200px;margin:0 auto;padding:40px 20px}
.page-header{text-align:center;margin-bottom:48px}
.page-title{font-size:56px;font-weight:900;margin-bottom:12px;background:linear-gradient(135deg,var(--primary),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.page-subtitle{font-size:20px;color:var(--text-secondary)}
.charts-badge{display:inline-block;padding:8px 20px;background:var(--gold);color:#000;font-weight:800;border-radius:20px;margin:16px 0}
.charts-grid{display:flex;flex-direction:column;gap:16px}
.chart-item{display:flex;align-items:center;padding:20px;background:var(--bg-card);border:1px solid var(--glass-border);border-radius:16px;transition:all 0.3s;cursor:pointer}
.chart-item:hover{transform:scale(1.02);border-color:var(--primary);box-shadow:0 10px 40px rgba(229,0,15,0.3)}
.chart-rank{font-size:48px;font-weight:900;width:80px;text-align:center}
.rank-1{color:var(--gold)}
.rank-2{color:#C0C0C0}
.rank-3{color:#CD7F32}
.chart-content{flex:1;margin:0 20px}
.chart-title{font-size:20px;font-weight:800;margin-bottom:4px}
.chart-artist{font-size:16px;color:var(--text-secondary)}
.chart-stats{display:flex;gap:24px;text-align:right}
.stat-value{font-size:20px;font-weight:700;color:var(--primary)}
.stat-label{font-size:11px;color:var(--text-secondary)}
.chart-thumb{width:80px;height:80px;border-radius:12px;background:linear-gradient(135deg,var(--primary),var(--gold));margin-left:20px}
.crown{font-size:28px}
@media(max-width:768px){.page-title{font-size:36px}.chart-item{flex-wrap:wrap}.chart-rank{font-size:32px;width:60px}.chart-thumb{width:60px;height:60px}.chart-stats{width:100%;justify-content:space-between;margin-top:12px}}
</style>
</head>
<body>

<div class="animated-bg">
  <div class="flag-stripe stripe-1"></div>
  <div class="flag-stripe stripe-2"></div>
  <div class="flag-stripe stripe-3"></div>
</div>

<header>
  <div class="header-content">
    <div class="logo" onclick="window.location='index.html'">
      <img src="Untitled design.png" class="logo-img" onerror="this.style.display='none'">
      <div>
        <div class="logo-title">WANNATION MEDIA</div>
      </div>
    </div>
    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="artists.html">Artists</a>
      <a href="charts.html" class="active">Charts</a>
      <a href="business.html">Business</a>
    </nav>
  </div>
</header>

<main>
  <div class="page-header">
    <h1 class="page-title">🏆 Venda Music Charts</h1>
    <p class="page-subtitle">Top 20 Most Played Songs This Week</p>
    <div class="charts-badge">🔥 Updated Daily</div>
  </div>

  <div class="charts-grid" id="charts"></div>
</main>

<script>
const charts = [
  { rank: 1, title: "Sesi Ka Rose", artist: "Makhadzi", plays: "2.4M", weeks: 8, trend: "↑" },
  { rank: 2, title: "Sakha Wena", artist: "Makhadzi", plays: "2.1M", weeks: 12, trend: "→" },
  { rank: 3, title: "Venda Mix 2025", artist: "DJ Thohoyandou", plays: "1.8M", weeks: 6, trend: "↑" },
  { rank: 4, title: "Baloi", artist: "Makhadzi", plays: "1.6M", weeks: 15, trend: "↓" },
  { rank: 5, title: "Tsini Ha Murena", artist: "Mukwevho Sisters", plays: "1.3M", weeks: 4, trend: "↑" },
  { rank: 6, title: "Una Rams Hit", artist: "Una Rams", plays: "1.1M", weeks: 9, trend: "→" },
  { rank: 7, title: "Venda Worship", artist: "Takesure Zamar", plays: "980K", weeks: 11, trend: "↓" },
  { rank: 8, title: "Amapiano Venda", artist: "DJ Maphorisa", plays: "920K", weeks: 7, trend: "↑" },
  { rank: 9, title: "Tshivenda Beat", artist: "Kabza De Small", plays: "850K", weeks: 5, trend: "↑" },
  { rank: 10, title: "Makhadzi Mix", artist: "Various Artists", plays: "780K", weeks: 10, trend: "→" },
  { rank: 11, title: "Venda House", artist: "Black Coffee", plays: "720K", weeks: 8, trend: "↓" },
  { rank: 12, title: "Gospel Venda", artist: "Ministry 7", plays: "680K", weeks: 6, trend: "↑" },
  { rank: 13, title: "Thohoyandou Night", artist: "DJ Sox", plays: "640K", weeks: 4, trend: "↑" },
  { rank: 14, title: "Venda Classics", artist: "Betty G", plays: "590K", weeks: 12, trend: "↓" },
  { rank: 15, title: "Ahead Makhadzi", artist: "Makhadzi", plays: "550K", weeks: 9, trend: "→" },
  { rank: 16, title: "Venda Vibes", artist: "Focalistic", plays: "510K", weeks: 3, trend: "↑" },
  { rank: 17, title: "Tshivenḓa Love", artist: "Sun-El Musician", plays: "480K", weeks: 7, trend: "↓" },
  { rank: 18, title: "Musa Key Tribute", artist: "Various", plays: "450K", weeks: 14, trend: "→" },
  { rank: 19, title: "Venda Party", artist: "DBN Gogo", plays: "420K", weeks: 5, trend: "↑" },
  { rank: 20, title: "New Wave Venda", artist: "Rising Artists", plays: "390K", weeks: 2, trend: "↑" }
];

function renderCharts() {
  const container = document.getElementById('charts');
  container.innerHTML = charts.map(song => `
    <div class="chart-item">
      <div class="chart-rank ${song.rank === 1 ? 'rank-1' : song.rank === 2 ? 'rank-2' : song.rank === 3 ? 'rank-3' : ''}">
        ${song.rank === 1 ? '👑' : ''}${song.rank}
      </div>
      <div class="chart-content">
        <div class="chart-title">${song.title}</div>
        <div class="chart-artist">${song.artist}</div>
      </div>
      <div class="chart-stats">
        <div>
          <div class="stat-value">${song.plays}</div>
          <div class="stat-label">Plays</div>
        </div>
        <div>
          <div class="stat-value">${song.weeks}</div>
          <div class="stat-label">Weeks</div>
        </div>
        <div>
          <div class="stat-value">${song.trend}</div>
          <div class="stat-label">Trend</div>
        </div>
      </div>
      <div class="chart-thumb"></div>
    </div>
  `).join('');
}

renderCharts();
console.log('✅ Venda Charts loaded');
</script>
</body>
</html>
