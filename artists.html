<!DOCTYPE html>
<html lang="en" data-theme="night">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artists — WANnation Media</title>
<link rel="icon" href="Untitled design.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
* {margin:0;padding:0;box-sizing:border-box;}
:root {
  --primary: #E5000F; --primary-glow: rgba(229, 0, 15, 0.5); --secondary: #BF5FFF; --gold: #FFD700;
  --bg: #000000; --bg-card: #1C1C1E; --glass-light: rgba(255, 255, 255, 0.1);
  --text: #FFFFFF; --text-secondary: rgba(255, 255, 255, 0.7); --border: rgba(255, 255, 255, 0.12);
}
[data-theme="day"] {
  --bg: #FFFFFF; --bg-card: #F2F2F7; --text: #1D1D1F; --text-secondary: rgba(29, 29, 31, 0.7);
}
body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; }
header { position: sticky; top: 0; z-index: 100; background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); padding: 12px 20px; }
[data-theme="day"] header { background: rgba(255,255,255,0.8); }
.header-content { max-width: 1400px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
.logo { display: flex; align-items: center; gap: 12px; }
.logo-title { font-size: 22px; font-weight: 900; }
.logo-subtitle { font-size: 12px; color: var(--text-secondary); }
.nav-links { display: flex; gap: 24px; }
.nav-links a { color: var(--text-secondary); text-decoration: none; font-weight: 500; }
.nav-links a:hover, .nav-links a.active { color: var(--primary); }
.nav-actions { display: flex; gap: 12px; align-items: center; }
.btn { padding: 10px 20px; border-radius: 10px; font-weight: 700; border: none; cursor: pointer; text-decoration: none; }
.btn-primary { background: var(--primary); color: white; }
.theme-toggle { width: 40px; height: 40px; border-radius: 50%; background: var(--glass-light); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 20px; }
main { max-width: 1400px; margin: 0 auto; padding: 40px 20px 140px; }
.page-header { margin-bottom: 40px; }
.page-title { font-size: 48px; font-weight: 900; margin-bottom: 12px; }
.page-subtitle { font-size: 20px; color: var(--text-secondary); }
.search-bar { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 16px 20px; font-size: 16px; color: var(--text); width: 100%; max-width: 500px; margin-bottom: 32px; }
.artists-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 24px; }
.artist-card { background: var(--bg-card); border-radius: 16px; padding: 24px; text-align: center; border: 1px solid var(--border); text-decoration: none; color: inherit; transition: all 0.3s; }
.artist-card:hover { transform: translateY(-8px); border-color: var(--primary); }
.artist-avatar { width: 120px; height: 120px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--secondary)); margin: 0 auto 16px; display: flex; align-items: center; justify-content: center; font-size: 56px; }
.artist-name { font-weight: 800; font-size: 20px; margin-bottom: 8px; }
.artist-genre { color: var(--text-secondary); font-size: 14px; margin-bottom: 12px; }
.artist-stats { display: flex; gap: 16px; justify-content: center; font-size: 13px; color: var(--text-secondary); }
@media (max-width: 768px) { .nav-links { display: none; } .page-title { font-size: 32px; } }
</style>
</head>
<body>

<header>
  <div class="header-content">
    <div class="logo">
      <img src="Untitled design.png" alt="WANnation" style="width:40px;height:40px;border-radius:50%;" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
      <span style="font-size:32px;display:none;">🪘</span>
      <div>
        <div class="logo-title">WANNATION MEDIA</div>
        <div class="logo-subtitle">The Voice of Venda</div>
      </div>
    </div>
    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="artists.html" class="active">Artists</a>
      <a href="premium.html">Premium</a>
      <a href="advertise.html">Advertise</a>
    </nav>
    <div class="nav-actions">
      <button class="theme-toggle" onclick="toggleTheme()">☀️</button>
      <a href="login.html" class="btn btn-primary">Login</a>
    </div>
  </div>
</header>

<main>
  <div class="page-header">
    <h1 class="page-title">🎤 Artists & Creators</h1>
    <p class="page-subtitle">Discover the best Venda artists and content creators</p>
  </div>

  <input type="text" class="search-bar" placeholder="🔍 Search artists by name or genre..." id="search">

  <div id="artists-grid" class="artists-grid"></div>
</main>

<script>
const artists = [
  { name: 'Makhadzi', genre: 'Amapiano / Venda', icon: '👑', followers: '2.4M', songs: 48, slug: 'makhadzi' },
  { name: 'Una Rams', genre: 'Venda Pop', icon: '🎤', followers: '156K', songs: 22, slug: 'una-rams' },
  { name: 'DJ Thohoyandou', genre: 'Venda House', icon: '🎧', followers: '89K', songs: 67, slug: 'dj-thohoyandou' },
  { name: 'Mukwevho Sisters', genre: 'Gospel', icon: '⛪', followers: '234K', songs: 31, slug: 'mukwevho-sisters' },
  { name: 'Takesure Zamar', genre: 'Gospel', icon: '🙏', followers: '178K', songs: 19, slug: 'takesure-zamar' },
  { name: 'Mizo Phyll', genre: 'Venda Hip Hop', icon: '🎤', followers: '112K', songs: 28, slug: 'mizo-phyll' },
  { name: 'VP Talking Muimbi', genre: 'Venda Rap', icon: '🎙️', followers: '95K', songs: 35, slug: 'vp-talking-muimbi' },
  { name: 'DJ Webaba', genre: 'Kwaito / Amapiano', icon: '🎧', followers: '567K', songs: 89, slug: 'dj-webaba' }
];

function renderArtists(filter = '') {
  const filtered = artists.filter(a => 
    a.name.toLowerCase().includes(filter.toLowerCase()) ||
    a.genre.toLowerCase().includes(filter.toLowerCase())
  );
  
  document.getElementById('artists-grid').innerHTML = filtered.map(artist => `
    <a href="#" class="artist-card">
      <div class="artist-avatar">${artist.icon}</div>
      <div class="artist-name">${artist.name}</div>
      <div class="artist-genre">${artist.genre}</div>
      <div class="artist-stats">
        <span>👥 ${artist.followers}</span>
        <span>🎵 ${artist.songs} songs</span>
      </div>
    </a>
  `).join('');
}

function toggleTheme() {
  const html = document.documentElement;
  const current = html.getAttribute('data-theme');
  const next = current === 'night' ? 'day' : 'night';
  html.setAttribute('data-theme', next);
  localStorage.setItem('wannation-theme', next);
}

document.getElementById('search').addEventListener('input', (e) => {
  renderArtists(e.target.value);
});

document.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem('wannation-theme');
  if(saved) document.documentElement.setAttribute('data-theme', saved);
  renderArtists();
});
</script>
</body>
</html>
